<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages - Makej!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);

        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);

        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
      }

      :root {
        --background: #09090b;
        --foreground: #fafafa;
        --primary: #a855f7;
        --primary-foreground: #ffffff;
        --secondary: #a3e635;
        --secondary-foreground: #09090b;
        --muted: #27272a;
        --muted-foreground: #a1a1aa;
        --accent: #27272a;
        --accent-foreground: #fafafa;
        --destructive: #f43f5e;
        --card: #18181b;
        --card-foreground: #fafafa;
        --popover: #18181b;
        --popover-foreground: #fafafa;
        --border: #27272a;
        --input: #27272a;
        --ring: #a855f7;
        --chart-1: #a855f7;
        --chart-2: #a3e635;
        --chart-3: #06b6d4;
        --chart-4: #f59e0b;
        --chart-5: #f43f5e;

        --font-sans: "Plus Jakarta Sans";
        --font-heading: "Space Grotesk";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";

        --radius: 1rem;
      }

      .chat-enter {
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .message-bubble {
        animation: bubbleIn 0.2s ease-out;
      }

      @keyframes bubbleIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .shift-card {
        animation: cardSlide 0.3s ease-out;
      }

      @keyframes cardSlide {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // Load matches from localStorage and create chats
      const getMatchesFromStorage = () => {
        const savedMatches = localStorage.getItem('makej_matches');
        if (savedMatches) {
          return JSON.parse(savedMatches);
        }
        return [];
      };

      // Generate chats from matches
      const generateChatsFromMatches = (matches) => {
        return matches.map((job, index) => ({
          id: index + 1,
          company: job.company,
          position: job.position,
          lastMessage: index === 0 ? 'Nová shoda! Pojď se podívat 👋' : 'Máme zájem o spolupráci',
          time: index === 0 ? 'teď' : `${index + 1}h`,
          unread: index === 0 ? 1 : 0,
          status: 'pending',
          avatar: job.company.charAt(0),
          online: Math.random() > 0.5,
          jobId: job.id
        }));
      };

      // Initialize chats from matches
      const initialMatches = getMatchesFromStorage();
      const mockChats = generateChatsFromMatches(initialMatches);

      // Fallback chats if no matches
      const fallbackChats = [
        {
          id: 999,
          company: "Makej! Team",
          position: "Support",
          lastMessage: "Vítejte v aplikaci! Swipe right pro lajkování nabídek.",
          time: "teď",
          unread: 1,
          status: "pending",
          avatar: "👋",
          online: true,
          jobId: null
        }
      ];

      const chats = mockChats.length > 0 ? mockChats : fallbackChats;

      // Generate dynamic messages based on job details
      const generateMessagesForChat = (chat) => {
        const baseMessages = [
          {
            id: 1,
            sender: "company",
            text: `Ahoj! Máme zájem o tebe na pozici ${chat.position}. Zvládneš to?`,
            time: "10:30"
          },
          {
            id: 2,
            sender: "user", 
            text: "Dobrý den! Ano, mám zájem. Můžu se dozvědět více?",
            time: "10:32"
          }
        ];

        // Add shift offer for new matches
        if (chat.unread > 0) {
          baseMessages.push({
            id: 3,
            type: "shift_offer",
            sender: "company",
            data: {
              date: "zítra",
              time: "7:00 - 13:00",
              pay: "18$/hod + spropitné",
              location: "Centrum"
            }
          });
        }

        return baseMessages;
      };

      const mockMessages = {};
      chats.forEach(chat => {
        mockMessages[chat.id] = generateMessagesForChat(chat);
      });

      function ShiftOfferCard({ offer, onAccept, onDecline }) {
        return (
          <div className="shift-card bg-gradient-to-br from-primary/20 to-secondary/20 border border-primary/30 rounded-2xl p-4 backdrop-blur-sm">
            <div className="flex items-center gap-2 mb-3">
              <div className="flex items-center justify-center size-8 rounded-full bg-primary/30 text-primary">
                <iconify-icon icon="solar:calendar-bold" class="size-4"></iconify-icon>
              </div>
              <span className="font-bold text-primary">Nabídka směny</span>
            </div>
            
            <div className="space-y-2 mb-4">
              <div className="flex items-center gap-2 text-sm">
                <iconify-icon icon="solar:calendar-bold" class="size-4 text-muted-foreground"></iconify-icon>
                <span className="text-foreground font-medium">{offer.date}</span>
              </div>
              <div className="flex items-center gap-2 text-sm">
                <iconify-icon icon="solar:clock-bold" class="size-4 text-muted-foreground"></iconify-icon>
                <span className="text-foreground font-medium">{offer.time}</span>
              </div>
              <div className="flex items-center gap-2 text-sm">
                <iconify-icon icon="solar:wallet-bold" class="size-4 text-muted-foreground"></iconify-icon>
                <span className="text-secondary font-bold">{offer.pay}</span>
              </div>
              <div className="flex items-center gap-2 text-sm">
                <iconify-icon icon="solar:map-point-bold" class="size-4 text-muted-foreground"></iconify-icon>
                <span className="text-foreground font-medium">{offer.location}</span>
              </div>
            </div>
            
            <div className="flex gap-2">
              <button
                onClick={onDecline}
                className="flex-1 px-4 py-2 bg-card/80 border border-border/50 rounded-xl text-muted-foreground hover:bg-destructive/20 hover:border-destructive/50 hover:text-destructive transition-all text-sm font-medium"
              >
                Odmítnout
              </button>
              <button
                onClick={onAccept}
                className="flex-1 px-4 py-2 bg-gradient-to-r from-primary to-secondary text-primary-foreground rounded-xl hover:scale-105 active:scale-95 transition-all text-sm font-bold shadow-lg"
              >
                Přijmout
              </button>
            </div>
          </div>
        );
      }

      function MessageBubble({ message }) {
        if (message.type === "shift_offer") {
          return <ShiftOfferCard offer={message.data} />;
        }

        const isUser = message.sender === "user";
        
        return (
          <div className={`flex ${isUser ? "justify-end" : "justify-start"} message-bubble`}>
            <div
              className={`max-w-[80%] px-4 py-3 rounded-2xl ${
                isUser
                  ? "bg-gradient-to-r from-primary to-secondary text-primary-foreground"
                  : "bg-card/80 border border-border/50 text-foreground backdrop-blur-sm"
              }`}
            >
              <p className="text-sm font-medium">{message.text}</p>
              {message.time && (
                <p className={`text-xs mt-1 ${isUser ? "text-primary-foreground/70" : "text-muted-foreground"}`}>
                  {message.time}
                </p>
              )}
            </div>
          </div>
        );
      }

      function ChatWindow({ chat, messages, onBack, onSendMessage }) {
        const [newMessage, setNewMessage] = useState("");

        const handleSend = () => {
          if (newMessage.trim()) {
            onSendMessage(chat.id, newMessage);
            setNewMessage("");
          }
        };

        const handleKeyPress = (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
          }
        };

        const getStatusColor = (status) => {
          switch (status) {
            case "confirmed":
              return "text-secondary bg-secondary/20 border-secondary/50";
            case "in_progress":
              return "text-primary bg-primary/20 border-primary/50";
            default:
              return "text-muted-foreground bg-muted/20 border-muted/50";
          }
        };

        const getStatusText = (status) => {
          switch (status) {
            case "confirmed":
              return "Domluvená";
            case "in_progress":
              return "Probíhá";
            default:
              return "Aktivní";
          }
        };

        return (
          <div className="flex flex-col h-full chat-enter">
            {/* Status Bar */}
            <div className="flex items-center justify-between px-4 py-3 bg-card/80 border-b border-border/50 backdrop-blur-sm">
              <div className="flex items-center gap-3">
                <button
                  onClick={onBack}
                  className="flex items-center justify-center size-8 rounded-full bg-muted/50 hover:bg-muted transition-colors"
                >
                  <iconify-icon icon="solar:alt-arrow-left-bold" class="size-5"></iconify-icon>
                </button>
                <div className="flex items-center gap-2">
                  <div className="relative">
                    <div className="flex items-center justify-center size-10 rounded-full bg-gradient-to-br from-primary/20 to-secondary/20 text-2xl">
                      {chat.avatar}
                    </div>
                    {chat.online && (
                      <div className="absolute bottom-0 right-0 size-3 bg-secondary rounded-full border-2 border-card"></div>
                    )}
                  </div>
                  <div>
                    <h3 className="font-heading font-bold text-foreground">{chat.company}</h3>
                    <p className="text-sm text-muted-foreground">{chat.position}</p>
                  </div>
                </div>
              </div>
              <div className={`px-3 py-1.5 rounded-full border text-xs font-bold uppercase tracking-wider ${getStatusColor(chat.status)}`}>
                {getStatusText(chat.status)}
              </div>
            </div>

            {/* Messages */}
            <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
              {messages.map((message) => (
                <MessageBubble key={message.id} message={message} />
              ))}
            </div>

            {/* Input */}
            <div className="p-4 bg-card/80 border-t border-border/50 backdrop-blur-sm">
              <div className="flex gap-2">
                <input
                  type="text"
                  value={newMessage}
                  onChange={(e) => setNewMessage(e.target.value)}
                  onKeyPress={handleKeyPress}
                  placeholder="Napiš zprávu..."
                  className="flex-1 px-4 py-3 bg-background border border-border/50 rounded-xl text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary"
                />
                <button
                  onClick={handleSend}
                  className="flex items-center justify-center size-12 rounded-full bg-gradient-to-r from-primary to-secondary text-primary-foreground hover:scale-105 active:scale-95 transition-all"
                >
                  <iconify-icon icon="solar:paperplane-bold" class="size-5"></iconify-icon>
                </button>
              </div>
            </div>
          </div>
        );
      }

      function ChatList({ chats, onSelectChat, selectedChatId }) {
        return (
          <div className="flex-1 overflow-y-auto">
            {chats.map((chat) => (
              <div
                key={chat.id}
                onClick={() => onSelectChat(chat)}
                className={`flex items-center gap-3 p-4 hover:bg-muted/50 transition-colors cursor-pointer border-b border-border/20 ${
                  selectedChatId === chat.id ? "bg-muted/30" : ""
                }`}
              >
                <div className="flex items-center justify-center size-12 rounded-full bg-gradient-to-br from-primary/20 to-secondary/20 text-2xl flex-shrink-0">
                  {chat.avatar}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between mb-1">
                    <h3 className="font-bold text-foreground truncate">{chat.company}</h3>
                    <span className="text-xs text-muted-foreground flex-shrink-0">{chat.time}</span>
                  </div>
                  <p className="text-sm text-muted-foreground truncate">{chat.position}</p>
                  <p className="text-sm text-foreground/70 truncate mt-1">{chat.lastMessage}</p>
                </div>
                {chat.unread > 0 && (
                  <div className="flex items-center justify-center size-6 rounded-full bg-primary text-primary-foreground text-xs font-bold flex-shrink-0">
                    {chat.unread}
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      }

      function Messages() {
        const [selectedChat, setSelectedChat] = useState(null);
        const [chatsState, setChatsState] = useState(chats);
        const [messagesState, setMessagesState] = useState(mockMessages);

        // Refresh matches from localStorage
        const refreshMatches = () => {
          const matches = getMatchesFromStorage();
          const newChats = generateChatsFromMatches(matches);
          if (newChats.length > 0) {
            setChatsState(newChats);
            const newMessages = {};
            newChats.forEach(chat => {
              newMessages[chat.id] = generateMessagesForChat(chat);
            });
            setMessagesState(newMessages);
          }
        };

        // Check for new matches periodically
        useEffect(() => {
          const interval = setInterval(() => {
            refreshMatches();
          }, 2000); // Check every 2 seconds

          return () => clearInterval(interval);
        }, []);

        const handleSendMessage = (chatId, text) => {
          const newMessage = {
            id: Date.now(),
            sender: "user",
            text: text,
            time: new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' })
          };

          // Add message
          setMessagesState(prev => ({
            ...prev,
            [chatId]: [...(prev[chatId] || []), newMessage]
          }));

          // Update chat last message
          setChatsState(prev => prev.map(chat => 
            chat.id === chatId 
              ? { ...chat, lastMessage: text, time: 'teď' }
              : chat
          ));

          // Simulate company response
          setTimeout(() => {
            const responses = [
              "Děkuji za zprávu! Ozvu se brzy.",
              "Super! Těšíme se na spolupráci.",
              "Potvrzuji, máš zájem?",
              "Perfektní! Domluvíme detaily.",
              "Díky! Pošlu ti více informací."
            ];
            
            const responseMessage = {
              id: Date.now() + 1,
              sender: "company",
              text: responses[Math.floor(Math.random() * responses.length)],
              time: new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' })
            };

            setMessagesState(prev => ({
              ...prev,
              [chatId]: [...(prev[chatId] || []), responseMessage]
            }));

            setChatsState(prev => prev.map(chat => 
              chat.id === chatId 
                ? { ...chat, lastMessage: responseMessage.text, time: 'teď' }
                : chat
            ));
          }, 1000 + Math.random() * 2000);
        };

        const handleShiftResponse = (chatId, accepted) => {
          const responseText = accepted ? "Přijímám! Děkuji za nabídku. 😊" : "Děkuji, ale musím odmítnout.";
          handleSendMessage(chatId, responseText);

          // Update chat status
          setChatsState(prev => prev.map(chat => 
            chat.id === chatId 
              ? { ...chat, status: accepted ? 'confirmed' : 'pending' }
              : chat
          ));
        };

        return (
          <div className="flex flex-col h-screen w-full bg-background text-foreground overflow-hidden font-sans">
            {/* Header */}
            <header className="flex items-center justify-between px-6 py-4 z-10">
              <h1 className="font-heading text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">
                Zprávy
              </h1>
              <div className="flex gap-3">
                <button className="flex items-center justify-center size-10 rounded-full bg-card border border-border/50 hover:bg-muted transition-colors">
                  <iconify-icon icon="solar:filters-bold" class="text-foreground size-5"></iconify-icon>
                </button>
                <button className="flex items-center justify-center size-10 rounded-full bg-card border border-border/50 hover:bg-muted transition-colors relative">
                  <iconify-icon icon="solar:bell-bold" class="text-foreground size-5"></iconify-icon>
                  {chatsState.filter(c => c.unread > 0).length > 0 && (
                    <span className="absolute top-2 right-2 size-2 bg-destructive rounded-full border border-card"></span>
                  )}
                </button>
              </div>
            </header>

            {/* Main Content */}
            <main className="flex-1 relative overflow-hidden">
              {selectedChat ? (
                <ChatWindow
                  chat={selectedChat}
                  messages={messagesState[selectedChat.id] || []}
                  onBack={() => setSelectedChat(null)}
                  onSendMessage={handleSendMessage}
                />
              ) : (
                <div className="h-full">
                  <ChatList
                    chats={chatsState}
                    onSelectChat={setSelectedChat}
                    selectedChatId={selectedChat?.id}
                  />
                </div>
              )}
            </main>

            {/* Bottom Navigation */}
            <nav className="flex items-center justify-around px-6 py-4 bg-background/90 backdrop-blur-2xl border-t border-border z-20 pb-8">
              <button 
                onClick={() => window.location.href = 'job-card.html'}
                className="flex flex-col items-center gap-1.5 text-muted-foreground hover:text-foreground transition-colors"
              >
                <iconify-icon icon="solar:cards-bold" class="size-7"></iconify-icon>
                <span className="text-[10px] font-bold uppercase tracking-wider">Práce</span>
              </button>
              <button className="flex flex-col items-center gap-1.5 text-primary transition-colors">
                <iconify-icon icon="solar:chat-round-bold" class="size-7"></iconify-icon>
                <span className="text-[10px] font-bold uppercase tracking-wider">Zprávy</span>
              </button>
              <button 
                onClick={() => window.location.href = 'user-profile.html'}
                className="flex flex-col items-center gap-1.5 text-muted-foreground hover:text-foreground transition-colors"
              >
                <iconify-icon icon="solar:user-bold" class="size-7"></iconify-icon>
                <span className="text-[10px] font-bold uppercase tracking-wider">Profil</span>
              </button>
            </nav>
          </div>
        );
      }

      ReactDOM.render(<Messages />, document.getElementById("root"));
    </script>
  </body>
</html>
