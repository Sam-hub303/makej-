<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makej! - Brigádní aplikace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);
        --font-font-sans: var(--font-sans);
        --font-font-heading: var(--font-heading);
        --font-font-serif: var(--font-serif);
        --font-font-mono: var(--font-mono);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
      }
      :root {
        --background: #09090b;
        --foreground: #fafafa;
        --primary: #a855f7;
        --primary-foreground: #ffffff;
        --secondary: #a3e635;
        --secondary-foreground: #09090b;
        --muted: #27272a;
        --muted-foreground: #a1a1aa;
        --accent: #27272a;
        --accent-foreground: #fafafa;
        --destructive: #f43f5e;
        --card: #18181b;
        --card-foreground: #fafafa;
        --popover: #18181b;
        --popover-foreground: #fafafa;
        --border: #27272a;
        --input: #27272a;
        --ring: #a855f7;
        --chart-1: #a855f7;
        --chart-2: #a3e635;
        --chart-3: #06b6d4;
        --chart-4: #f59e0b;
        --chart-5: #f43f5e;
        --font-sans: "Plus Jakarta Sans";
        --font-heading: "Space Grotesk";
        --font-serif: "Playfair Display";
        --font-mono: "JetBrains Mono";
        --radius: 1rem;
      }
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      .card-swipe { transition: all 0.3s ease-out; cursor: grab; }
      .card-swipe:active { cursor: grabbing; }
      .card-swipe-left { transform: translateX(-120%) rotate(-30deg); opacity: 0; }
      .card-swipe-right { transform: translateX(120%) rotate(30deg); opacity: 0; }
      .card-swipe-up { transform: translateY(-120%) scale(0.8); opacity: 0; }
      @keyframes heartPulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
      .heart-animation { animation: heartPulse 0.3s ease-out; }
      @keyframes slideInNext { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      .slide-in-next { animation: slideInNext 0.3s ease-out; }
      .no-more-cards { animation: fadeIn 0.5s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .chat-enter { animation: slideIn 0.3s ease-out; }
      @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      .message-bubble { animation: bubbleIn 0.2s ease-out; }
      @keyframes bubbleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .shift-card { animation: cardSlide 0.3s ease-out; }
      @keyframes cardSlide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .edit-mode { animation: slideUp 0.3s ease-out; }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .stat-card { transition: all 0.3s ease-out; }
      .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2); }
      .view-transition { animation: fadeIn 0.25s ease-out; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

      // ============ SHARED DATA ============
      const jobsData = [
        { id: 1, company: 'The Bean Scene', position: 'Barista', location: 'Centrum', distance: '1.2 km', pay: 18, payUnit: '/ hod', tips: true, date: 'zítra', time: '7:00 - 13:00', duration: '6 hod', image: 'https://ggrhecslgdflloszjkwl.supabase.co/storage/v1/object/public/user-assets/MHIY6QacKaF/components/FU7SALGOTUw.png', tags: ['Žádané pozice', 'Bez zkušeností'], description: 'Hledáme milého a spolehlivého baristu na ranní směny.', requirements: ['Zájem o kávu', 'Spolehlivost', 'Příjemné vystupování'] },
        { id: 2, company: 'Burger Palace', position: 'Pomocník v kuchyni', location: 'Nové Město', distance: '2.1 km', pay: 16, payUnit: '/ hod', tips: false, date: 'dnes', time: '17:00 - 22:00', duration: '5 hod', image: 'https://images.unsplash.com/photo-1568901346405-7dcbbdee2f4c?w=400', tags: ['Pohodové'], description: 'Pomoc v kuchyni v rušném burgerovém podniku.', requirements: ['Zkušenosti v kuchyni výhodou', 'Rychlost', 'Čistota'] },
        { id: 3, company: 'City Cafe', position: 'Číšník', location: 'Staré Město', distance: '0.8 km', pay: 17, payUnit: '/ hod', tips: true, date: 'zítra', time: '12:00 - 18:00', duration: '6 hod', image: 'https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=400', tags: ['Flexibilní'], description: 'Obsluha hostů v moderní kavárně.', requirements: ['Zkušenosti s obsluhou', 'Angličtina výhodou', 'Smích'] },
        { id: 4, company: 'Pizza Express', position: 'Řidič rozvozu', location: 'Královské Vinohrady', distance: '3.5 km', pay: 15, payUnit: '/ hod', tips: true, date: 'dnes', time: '18:00 - 23:00', duration: '5 hod', image: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=400', tags: ['Žádané pozice', 'Flexibilní'], description: 'Rozvoz jídla na skútru.', requirements: ['Řidičský průkaz', 'Přehled Prahy', 'Spolehlivost'] },
        { id: 5, company: 'Sushi Master', position: 'Sous Chef', location: 'Karlín', distance: '1.8 km', pay: 22, payUnit: '/ hod', tips: true, date: 'zítra', time: '11:00 - 22:00', duration: '11 hod', image: 'https://images.unsplash.com/photo-1563245372-f21724e3856d?w=400', tags: ['Žádané pozice', 'Zkušenosti vyžadovány'], description: 'Pomoc šéfkuchaři v moderní sushi restauraci.', requirements: ['Zkušenosti s japonskou kuchyní', 'Preciznost', 'Týmový duch'] }
      ];

      const getUserData = () => {
        const savedData = localStorage.getItem('makej_user_data');
        if (savedData) return JSON.parse(savedData);
        return { id: 1, name: 'Samuel Pšeja', email: 'samuel@example.cz', phone: '+420 123 456 789', bio: 'Rád pomáhám a učím se novým věcem. Spolehlivý a always on time!', level: 12, xp: 1250, rating: 4.8, jobsDone: 32, hoursLogged: 124, punctuality: 98, totalEarned: 2410, verified: true, badges: ['quick_starter', 'flawless', '7_day_streak'], avatar: 'https://lh3.googleusercontent.com/a/ACg8ocJynEXFGOLlKRabsq8-8Zbtt9QW-6u94dHQDkxcxxlqi5Rn1jg=s96-c' };
      };

      // ============ BOTTOM NAV ============
      function BottomNav({ currentView, onNavigate, matchCount }) {
        return (
          <nav className="flex items-center justify-around px-6 py-4 bg-background/90 backdrop-blur-2xl border-t border-border z-20 pb-8 shrink-0">
            <button onClick={() => onNavigate('jobs')} className={`flex flex-col items-center gap-1.5 transition-colors group ${currentView === 'jobs' ? 'text-primary' : 'text-muted-foreground hover:text-foreground'}`}>
              <iconify-icon icon="solar:case-round-bold" class="size-7 group-active:scale-90 transition-transform"></iconify-icon>
              <span className="text-[10px] font-bold uppercase tracking-wider">Práce</span>
            </button>
            <button onClick={() => onNavigate('messages')} className={`flex flex-col items-center gap-1.5 transition-colors relative group ${currentView === 'messages' ? 'text-primary' : 'text-muted-foreground hover:text-foreground'}`}>
              <iconify-icon icon="solar:chat-round-bold" class="size-7 group-active:scale-90 transition-transform"></iconify-icon>
              <span className="text-[10px] font-bold uppercase tracking-wider">Zprávy</span>
              {matchCount > 0 && (
                <span className="absolute -top-1 -right-1 size-5 bg-secondary text-background rounded-full text-xs font-bold flex items-center justify-center">{matchCount}</span>
              )}
            </button>
            <button onClick={() => onNavigate('profile')} className={`flex flex-col items-center gap-1.5 transition-colors group ${currentView === 'profile' ? 'text-primary' : 'text-muted-foreground hover:text-foreground'}`}>
              <iconify-icon icon="solar:user-bold" class="size-7 group-active:scale-90 transition-transform"></iconify-icon>
              <span className="text-[10px] font-bold uppercase tracking-wider">Profil</span>
            </button>
          </nav>
        );
      }

      // ============ JOB CARD VIEW ============
      function JobCard({ job, onSwipe, onLike, onReject, onView }) {
        const [isAnimating, setIsAnimating] = useState(false);
        const cardRef = useRef(null);
        useEffect(() => {
          const card = cardRef.current;
          if (!card) return;
          let startX = 0, currentX = 0, isDragging = false;
          const handleStart = (x) => { startX = x; isDragging = true; card.style.transition = 'none'; };
          const handleMove = (x) => { if (!isDragging) return; currentX = x - startX; card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.1}deg)`; const opacity = Math.max(0.3, 1 - Math.abs(currentX) / 300); card.style.opacity = opacity; };
          const handleEnd = () => { if (!isDragging) return; isDragging = false; card.style.transition = 'all 0.3s ease-out'; const threshold = 100; if (currentX > threshold) { card.style.transform = 'translateX(120%) rotate(30deg)'; card.style.opacity = '0'; setTimeout(() => onSwipe('right', job), 300); } else if (currentX < -threshold) { card.style.transform = 'translateX(-120%) rotate(-30deg)'; card.style.opacity = '0'; setTimeout(() => onSwipe('left', job), 300); } else { card.style.transform = 'translateX(0) rotate(0)'; card.style.opacity = '1'; } currentX = 0; };
          const onMD = (e) => handleStart(e.clientX);
          const onMM = (e) => handleMove(e.clientX);
          const onTS = (e) => handleStart(e.touches[0].clientX);
          const onTM = (e) => { if (isDragging) handleMove(e.touches[0].clientX); };
          card.addEventListener('mousedown', onMD);
          document.addEventListener('mousemove', onMM);
          document.addEventListener('mouseup', handleEnd);
          card.addEventListener('touchstart', onTS);
          document.addEventListener('touchmove', onTM);
          document.addEventListener('touchend', handleEnd);
          return () => { card.removeEventListener('mousedown', onMD); document.removeEventListener('mousemove', onMM); document.removeEventListener('mouseup', handleEnd); card.removeEventListener('touchstart', onTS); document.removeEventListener('touchmove', onTM); document.removeEventListener('touchend', handleEnd); };
        }, [onSwipe, job]);
        const handleLikeClick = () => { setIsAnimating(true); onLike(job); setTimeout(() => onSwipe('right', job), 300); };
        const handleRejectClick = () => { setIsAnimating(true); onReject(job); setTimeout(() => onSwipe('left', job), 300); };
        const handleViewClick = () => { onView(job); setTimeout(() => onSwipe('up', job), 300); };
        return (
          <div ref={cardRef} className={`relative w-full h-full max-h-[75vh] rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 bg-card card-swipe ${isAnimating ? 'heart-animation' : ''}`}>
            <img src={job.image} alt={job.position} className="absolute inset-0 w-full h-full object-cover" />
            <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-black/10"></div>
            <div className="absolute bottom-0 left-0 w-full p-6 flex flex-col justify-end">
              <div className="flex gap-2 mb-4">
                {job.tags.map((tag, index) => (
                  <span key={index} className={`px-3 py-1.5 text-[11px] font-bold uppercase tracking-wider rounded-full backdrop-blur-md ${tag === 'Žádané pozice' ? 'bg-secondary/20 text-secondary border border-secondary/50 shadow-[0_0_10px_rgba(163,230,53,0.3)]' : 'bg-white/10 text-white border border-white/20'}`}>
                    {tag === 'Žádané pozice' ? '🔥 ' : ''}{tag}
                  </span>
                ))}
              </div>
              <div className="flex justify-between items-end mb-5">
                <div className="flex-1">
                  <h2 className="font-heading text-4xl font-black text-white mb-1 leading-none tracking-tight shadow-black/50 drop-shadow-md">{job.position}</h2>
                  <p className="text-white/80 text-lg font-medium tracking-wide">@ {job.company}</p>
                </div>
                <div className="text-right shrink-0 pl-4">
                  <span className="block font-heading text-5xl font-black bg-clip-text text-transparent bg-gradient-to-br from-primary via-[#d946ef] to-secondary drop-shadow-[0_2px_10px_rgba(168,85,247,0.5)]">${job.pay}</span>
                  <span className="text-white/70 text-sm font-bold uppercase tracking-wider">{job.payUnit} {job.tips && '+ spropitné'}</span>
                </div>
              </div>
              <div className="flex flex-col gap-4 mb-8">
                <div className="flex items-center gap-3 text-white bg-black/40 backdrop-blur-xl px-4 py-3 rounded-2xl border border-white/10 shadow-lg">
                  <div className="flex items-center justify-center size-8 rounded-full bg-secondary/20 text-secondary"><iconify-icon icon="solar:map-point-bold" class="size-4"></iconify-icon></div>
                  <div className="flex flex-col"><span className="font-bold text-sm leading-tight">{job.location}</span><span className="text-white/60 text-xs font-medium">{job.distance} daleko</span></div>
                </div>
                <div className="flex items-center gap-3 text-white bg-black/40 backdrop-blur-xl px-4 py-3 rounded-2xl border border-white/10 shadow-lg">
                  <div className="flex items-center justify-center size-8 rounded-full bg-primary/20 text-primary"><iconify-icon icon="solar:calendar-bold" class="size-4"></iconify-icon></div>
                  <div className="flex flex-col"><span className="font-bold text-sm leading-tight">{job.date}</span><span className="text-white/60 text-xs font-medium">{job.time} ({job.duration})</span></div>
                </div>
              </div>
              <div className="pb-8"></div>
            </div>
            <div className="absolute bottom-0 left-0 w-full flex items-center justify-center gap-6 px-8 pb-4 z-20">
              <button onClick={handleRejectClick} className="flex items-center justify-center size-16 rounded-full bg-card/80 border border-white/10 backdrop-blur-2xl text-destructive hover:bg-destructive/20 hover:border-destructive/50 transition-all shadow-xl hover:scale-105 active:scale-95"><iconify-icon icon="solar:close-circle-bold" class="size-12"></iconify-icon></button>
              <button onClick={handleLikeClick} className="flex items-center justify-center size-20 rounded-full bg-gradient-to-br from-primary to-[#9333ea] text-white shadow-[0_0_40px_rgba(168,85,247,0.6)] hover:scale-110 active:scale-95 transition-all border-2 border-white/20"><iconify-icon icon="solar:heart-angle-bold" class="size-14"></iconify-icon></button>
            </div>
          </div>
        );
      }

      function NoMoreCards({ onReset, matchCount, onNavigate }) {
        return (
          <div className="flex-1 flex items-center justify-center no-more-cards">
            <div className="text-center max-w-sm px-6">
              <iconify-icon icon="solar:heart-bold" class="size-20 text-muted-foreground mb-6 mx-auto"></iconify-icon>
              <h2 className="font-heading text-2xl font-black text-white mb-4">To je pro dnešek vše!</h2>
              <p className="text-muted-foreground mb-6">Prohlédl sis všechny dostupné nabídky. Zkuste to znovu později nebo si prohlédněte vaše matches.</p>
              <div className="space-y-3">
                <button onClick={() => onNavigate('messages')} className="w-full px-6 py-3 bg-gradient-to-r from-primary to-secondary text-primary-foreground rounded-xl font-bold hover:scale-[1.02] active:scale-[0.98] transition-all">Zobrazit matches ({matchCount})</button>
                <button onClick={onReset} className="w-full px-6 py-3 bg-card/80 border border-border/50 text-foreground rounded-xl font-medium hover:bg-muted transition-all">Zkusit znovu</button>
              </div>
            </div>
          </div>
        );
      }

      function JobsView({ matches, onAddMatch, onAddRejection, onNavigate }) {
        const [jobs] = useState(jobsData);
        const [currentJobIndex, setCurrentJobIndex] = useState(0);
        const [showNoMore, setShowNoMore] = useState(false);
        const showMatchNotification = (job) => {
          const notification = document.createElement('div');
          notification.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-primary to-secondary text-primary-foreground px-6 py-3 rounded-full shadow-lg z-50';
          notification.innerHTML = `<div class="flex items-center gap-2"><iconify-icon icon="solar:heart-bold" class="size-5"></iconify-icon><span class="font-bold">Nová shoda s ${job.company}!</span></div>`;
          document.body.appendChild(notification);
          setTimeout(() => notification.remove(), 1500);
        };
        const handleSwipe = (direction, job) => {
          const nextIndex = currentJobIndex + 1;
          if (nextIndex < jobs.length) setCurrentJobIndex(nextIndex);
          else setShowNoMore(true);
          if (direction === 'right') { onAddMatch(job); showMatchNotification(job); }
          else if (direction === 'left') { onAddRejection(job); }
        };
        const handleReset = () => { setCurrentJobIndex(0); setShowNoMore(false); };
        const currentJob = jobs[currentJobIndex];
        return (
          <>
            <header className="flex items-center justify-between px-6 py-4 z-10">
              <h1 className="font-heading text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Makej!</h1>
              <div className="flex gap-3">
                <button className="flex items-center justify-center size-10 rounded-full bg-card border border-border/50 hover:bg-muted transition-colors"><iconify-icon icon="solar:filters-bold" class="text-foreground size-5"></iconify-icon></button>
                <button className="flex items-center justify-center size-10 rounded-full bg-card border border-border/50 hover:bg-muted transition-colors relative"><iconify-icon icon="solar:bell-bold" class="text-foreground size-5"></iconify-icon>{matches.length > 0 && <span className="absolute top-2 right-2 size-2 bg-secondary rounded-full border border-card"></span>}</button>
              </div>
            </header>
            <main className="flex-1 relative px-4 pb-4 overflow-hidden flex flex-col items-center justify-start z-10">
              {showNoMore ? <NoMoreCards onReset={handleReset} matchCount={matches.length} onNavigate={onNavigate} /> : currentJob ? <JobCard key={currentJob.id} job={currentJob} onSwipe={handleSwipe} onLike={() => {}} onReject={() => {}} onView={() => {}} /> : null}
            </main>
          </>
        );
      }

      // ============ MESSAGES VIEW ============
      function ShiftOfferCard({ offer, onAccept, onDecline }) {
        return (
          <div className="shift-card bg-gradient-to-br from-primary/20 to-secondary/20 border border-primary/30 rounded-2xl p-4 backdrop-blur-sm">
            <div className="flex items-center gap-2 mb-3"><div className="flex items-center justify-center size-8 rounded-full bg-primary/30 text-primary"><iconify-icon icon="solar:calendar-bold" class="size-4"></iconify-icon></div><span className="font-bold text-primary">Nabídka směny</span></div>
            <div className="space-y-2 mb-4">
              <div className="flex items-center gap-2 text-sm"><iconify-icon icon="solar:calendar-bold" class="size-4 text-muted-foreground"></iconify-icon><span className="text-foreground font-medium">{offer.date}</span></div>
              <div className="flex items-center gap-2 text-sm"><iconify-icon icon="solar:clock-bold" class="size-4 text-muted-foreground"></iconify-icon><span className="text-foreground font-medium">{offer.time}</span></div>
              <div className="flex items-center gap-2 text-sm"><iconify-icon icon="solar:wallet-bold" class="size-4 text-muted-foreground"></iconify-icon><span className="text-secondary font-bold">{offer.pay}</span></div>
              <div className="flex items-center gap-2 text-sm"><iconify-icon icon="solar:map-point-bold" class="size-4 text-muted-foreground"></iconify-icon><span className="text-foreground font-medium">{offer.location}</span></div>
            </div>
            <div className="flex gap-2">
              <button onClick={onDecline} className="flex-1 px-4 py-2 bg-card/80 border border-border/50 rounded-xl text-muted-foreground hover:bg-destructive/20 hover:border-destructive/50 hover:text-destructive transition-all text-sm font-medium">Odmítnout</button>
              <button onClick={onAccept} className="flex-1 px-4 py-2 bg-gradient-to-r from-primary to-secondary text-primary-foreground rounded-xl hover:scale-105 active:scale-95 transition-all text-sm font-bold shadow-lg">Přijmout</button>
            </div>
          </div>
        );
      }

      function MessageBubble({ message }) {
        if (message.type === "shift_offer") return <ShiftOfferCard offer={message.data} />;
        const isUser = message.sender === "user";
        return (
          <div className={`flex ${isUser ? "justify-end" : "justify-start"} message-bubble`}>
            <div className={`max-w-[80%] px-4 py-3 rounded-2xl ${isUser ? "bg-gradient-to-r from-primary to-secondary text-primary-foreground" : "bg-card/80 border border-border/50 text-foreground backdrop-blur-sm"}`}>
              <p className="text-sm font-medium">{message.text}</p>
              {message.time && <p className={`text-xs mt-1 ${isUser ? "text-primary-foreground/70" : "text-muted-foreground"}`}>{message.time}</p>}
            </div>
          </div>
        );
      }

      function ChatWindow({ chat, messages, onBack, onSendMessage }) {
        const [newMessage, setNewMessage] = useState("");
        const handleSend = () => { if (newMessage.trim()) { onSendMessage(chat.id, newMessage); setNewMessage(""); } };
        const handleKeyPress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        const getStatusColor = (s) => { if (s === "confirmed") return "text-secondary bg-secondary/20 border-secondary/50"; if (s === "in_progress") return "text-primary bg-primary/20 border-primary/50"; return "text-muted-foreground bg-muted/20 border-muted/50"; };
        const getStatusText = (s) => { if (s === "confirmed") return "Domluvená"; if (s === "in_progress") return "Probíhá"; return "Aktivní"; };
        return (
          <div className="flex flex-col h-full chat-enter">
            <div className="flex items-center justify-between px-4 py-3 bg-card/80 border-b border-border/50 backdrop-blur-sm">
              <div className="flex items-center gap-3">
                <button onClick={onBack} className="flex items-center justify-center size-8 rounded-full bg-muted/50 hover:bg-muted transition-colors"><iconify-icon icon="solar:alt-arrow-left-bold" class="size-5"></iconify-icon></button>
                <div className="flex items-center gap-2">
                  <div className="relative"><div className="flex items-center justify-center size-10 rounded-full bg-gradient-to-br from-primary/20 to-secondary/20 text-2xl">{chat.avatar}</div>{chat.online && <div className="absolute bottom-0 right-0 size-3 bg-secondary rounded-full border-2 border-card"></div>}</div>
                  <div><h3 className="font-heading font-bold text-foreground">{chat.company}</h3><p className="text-sm text-muted-foreground">{chat.position}</p></div>
                </div>
              </div>
              <div className={`px-3 py-1.5 rounded-full border text-xs font-bold uppercase tracking-wider ${getStatusColor(chat.status)}`}>{getStatusText(chat.status)}</div>
            </div>
            <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">{messages.map((m) => <MessageBubble key={m.id} message={m} />)}</div>
            <div className="p-4 bg-card/80 border-t border-border/50 backdrop-blur-sm">
              <div className="flex gap-2">
                <input type="text" value={newMessage} onChange={(e) => setNewMessage(e.target.value)} onKeyPress={handleKeyPress} placeholder="Napiš zprávu..." className="flex-1 px-4 py-3 bg-background border border-border/50 rounded-xl text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary" />
                <button onClick={handleSend} className="flex items-center justify-center size-12 rounded-full bg-gradient-to-r from-primary to-secondary text-primary-foreground hover:scale-105 active:scale-95 transition-all"><iconify-icon icon="solar:paperplane-bold" class="size-5"></iconify-icon></button>
              </div>
            </div>
          </div>
        );
      }

      function MessagesView({ matches }) {
        const [selectedChat, setSelectedChat] = useState(null);
        const chats = matches.length > 0
          ? matches.map((job, i) => ({ id: job.id, company: job.company, position: job.position, lastMessage: i === 0 ? 'Nová shoda! Pojď se podívat 👋' : 'Máme zájem o spolupráci', time: i === 0 ? 'teď' : `${i + 1}h`, unread: i === 0 ? 1 : 0, status: 'pending', avatar: job.company.charAt(0), online: Math.random() > 0.5, jobId: job.id }))
          : [{ id: 999, company: "Makej! Team", position: "Support", lastMessage: "Vítejte v aplikaci! Swipe right pro lajkování nabídek.", time: "teď", unread: 1, status: "pending", avatar: "👋", online: true, jobId: null }];

        const generateMessages = (chat) => {
          const msgs = [{ id: 1, sender: "company", text: `Ahoj! Máme zájem o tebe na pozici ${chat.position}. Zvládneš to?`, time: "10:30" }, { id: 2, sender: "user", text: "Dobrý den! Ano, mám zájem. Můžu se dozvědět více?", time: "10:32" }];
          if (chat.unread > 0) msgs.push({ id: 3, type: "shift_offer", sender: "company", data: { date: "zítra", time: "7:00 - 13:00", pay: "18$/hod + spropitné", location: "Centrum" } });
          return msgs;
        };

        const [messagesState, setMessagesState] = useState(() => {
          const m = {};
          chats.forEach(c => { m[c.id] = generateMessages(c); });
          return m;
        });
        const [chatsState, setChatsState] = useState(chats);

        useEffect(() => {
          const newChats = matches.length > 0
            ? matches.map((job, i) => ({ id: job.id, company: job.company, position: job.position, lastMessage: i === 0 ? 'Nová shoda! Pojď se podívat 👋' : 'Máme zájem o spolupráci', time: i === 0 ? 'teď' : `${i + 1}h`, unread: i === 0 ? 1 : 0, status: 'pending', avatar: job.company.charAt(0), online: Math.random() > 0.5, jobId: job.id }))
            : [{ id: 999, company: "Makej! Team", position: "Support", lastMessage: "Vítejte v aplikaci! Swipe right pro lajkování nabídek.", time: "teď", unread: 1, status: "pending", avatar: "👋", online: true, jobId: null }];
          setChatsState(newChats);
          setMessagesState(prev => {
            const m = { ...prev };
            newChats.forEach(c => { if (!m[c.id]) m[c.id] = generateMessages(c); });
            return m;
          });
        }, [matches]);

        const handleSendMessage = (chatId, text) => {
          const nm = { id: Date.now(), sender: "user", text, time: new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' }) };
          setMessagesState(prev => ({ ...prev, [chatId]: [...(prev[chatId] || []), nm] }));
          setChatsState(prev => prev.map(c => c.id === chatId ? { ...c, lastMessage: text, time: 'teď' } : c));
          setTimeout(() => {
            const responses = ["Děkuji za zprávu! Ozvu se brzy.", "Super! Těšíme se na spolupráci.", "Potvrzuji, máš zájem?", "Perfektní! Domluvíme detaily.", "Díky! Pošlu ti více informací."];
            const rm = { id: Date.now() + 1, sender: "company", text: responses[Math.floor(Math.random() * responses.length)], time: new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' }) };
            setMessagesState(prev => ({ ...prev, [chatId]: [...(prev[chatId] || []), rm] }));
            setChatsState(prev => prev.map(c => c.id === chatId ? { ...c, lastMessage: rm.text, time: 'teď' } : c));
          }, 1000 + Math.random() * 2000);
        };

        return (
          <>
            <header className="flex items-center justify-between px-6 py-4 z-10">
              <h1 className="font-heading text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Zprávy</h1>
              <div className="flex gap-3">
                <button className="flex items-center justify-center size-10 rounded-full bg-card border border-border/50 hover:bg-muted transition-colors"><iconify-icon icon="solar:filters-bold" class="text-foreground size-5"></iconify-icon></button>
                <button className="flex items-center justify-center size-10 rounded-full bg-card border border-border/50 hover:bg-muted transition-colors relative"><iconify-icon icon="solar:bell-bold" class="text-foreground size-5"></iconify-icon>{chatsState.filter(c => c.unread > 0).length > 0 && <span className="absolute top-2 right-2 size-2 bg-destructive rounded-full border border-card"></span>}</button>
              </div>
            </header>
            <main className="flex-1 relative overflow-hidden">
              {selectedChat ? (
                <ChatWindow chat={selectedChat} messages={messagesState[selectedChat.id] || []} onBack={() => setSelectedChat(null)} onSendMessage={handleSendMessage} />
              ) : (
                <div className="h-full flex-1 overflow-y-auto">
                  {chatsState.map((chat) => (
                    <div key={chat.id} onClick={() => setSelectedChat(chat)} className="flex items-center gap-3 p-4 hover:bg-muted/50 transition-colors cursor-pointer border-b border-border/20">
                      <div className="flex items-center justify-center size-12 rounded-full bg-gradient-to-br from-primary/20 to-secondary/20 text-2xl flex-shrink-0">{chat.avatar}</div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between mb-1"><h3 className="font-bold text-foreground truncate">{chat.company}</h3><span className="text-xs text-muted-foreground flex-shrink-0">{chat.time}</span></div>
                        <p className="text-sm text-muted-foreground truncate">{chat.position}</p>
                        <p className="text-sm text-foreground/70 truncate mt-1">{chat.lastMessage}</p>
                      </div>
                      {chat.unread > 0 && <div className="flex items-center justify-center size-6 rounded-full bg-primary text-primary-foreground text-xs font-bold flex-shrink-0">{chat.unread}</div>}
                    </div>
                  ))}
                </div>
              )}
            </main>
          </>
        );
      }

      // ============ PROFILE VIEW ============
      function StatsCard({ icon, value, label, color = 'primary' }) {
        const cc = { primary: 'bg-primary/10 text-primary hover:border-primary/30', secondary: 'bg-secondary/10 text-secondary hover:border-secondary/30', accent: 'bg-white/10 text-white hover:border-white/30', emerald: 'bg-emerald-500/10 text-emerald-400 hover:border-emerald-500/30' };
        return (
          <div className={`bg-card/40 backdrop-blur-md border border-white/5 p-6 rounded-[2rem] stat-card ${cc[color]}`}>
            <div className="size-10 rounded-2xl bg-current/20 flex items-center justify-center mb-4"><iconify-icon icon={icon} class="size-6"></iconify-icon></div>
            <div className="font-heading text-3xl font-black text-white leading-none tracking-tight">{value}</div>
            <div className="text-[10px] font-black uppercase tracking-widest text-white/40 mt-2">{label}</div>
          </div>
        );
      }

      function EditProfileModal({ user, onSave, onClose }) {
        const [formData, setFormData] = useState({ ...user });
        const handleSubmit = (e) => { e.preventDefault(); onSave(formData); };
        const handleChange = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));
        return (
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-6 edit-mode">
            <div className="bg-card/90 backdrop-blur-xl border border-white/10 rounded-[2rem] p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
              <div className="flex items-center justify-between mb-6"><h2 className="font-heading text-xl font-black text-white">Upravit profil</h2><button onClick={onClose} className="flex items-center justify-center size-8 rounded-full bg-muted/50 hover:bg-muted transition-colors"><iconify-icon icon="solar:close-bold" class="size-5"></iconify-icon></button></div>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div><label className="block text-sm font-medium text-foreground mb-2">Jméno</label><input type="text" value={formData.name} onChange={(e) => handleChange('name', e.target.value)} className="w-full px-4 py-3 bg-background border border-border/50 rounded-xl text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary" required /></div>
                <div><label className="block text-sm font-medium text-foreground mb-2">Email</label><input type="email" value={formData.email} onChange={(e) => handleChange('email', e.target.value)} className="w-full px-4 py-3 bg-background border border-border/50 rounded-xl text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary" required /></div>
                <div><label className="block text-sm font-medium text-foreground mb-2">Telefon</label><input type="tel" value={formData.phone} onChange={(e) => handleChange('phone', e.target.value)} className="w-full px-4 py-3 bg-background border border-border/50 rounded-xl text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary" /></div>
                <div><label className="block text-sm font-medium text-foreground mb-2">O mně</label><textarea value={formData.bio} onChange={(e) => handleChange('bio', e.target.value)} className="w-full px-4 py-3 bg-background border border-border/50 rounded-xl text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary h-24 resize-none" placeholder="Něco o sobě..." /></div>
                <div className="flex gap-3 pt-4">
                  <button type="button" onClick={onClose} className="flex-1 px-6 py-3 bg-card/80 border border-border/50 text-foreground rounded-xl font-medium hover:bg-muted transition-all">Zrušit</button>
                  <button type="submit" className="flex-1 px-6 py-3 bg-gradient-to-r from-primary to-secondary text-primary-foreground rounded-xl font-bold hover:scale-[1.02] active:scale-[0.98] transition-all">Uložit</button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      function ProfileView() {
        const [user, setUser] = useState(getUserData());
        const [showEditModal, setShowEditModal] = useState(false);
        const handleSaveProfile = (updatedUser) => {
          setUser(updatedUser); localStorage.setItem('makej_user_data', JSON.stringify(updatedUser)); setShowEditModal(false);
          const notification = document.createElement('div');
          notification.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-primary to-secondary text-primary-foreground px-6 py-3 rounded-full shadow-lg z-50';
          notification.innerHTML = `<div class="flex items-center gap-2"><iconify-icon icon="solar:check-circle-bold" class="size-5"></iconify-icon><span class="font-bold">Profil uložen!</span></div>`;
          document.body.appendChild(notification);
          setTimeout(() => notification.remove(), 1500);
        };
        const getNextLevelXP = () => 2000;
        const progressPercentage = (user.xp / getNextLevelXP()) * 100;
        return (
          <>
            <header className="flex items-center justify-between px-6 py-4 z-10 shrink-0">
              <h1 className="font-heading text-2xl font-bold tracking-tight">Můj profil</h1>
              <button className="flex items-center justify-center size-10 rounded-full bg-card border border-border/50 active:scale-95 transition-transform"><iconify-icon icon="solar:settings-bold" class="text-foreground size-5"></iconify-icon></button>
            </header>
            <div className="flex-1 overflow-y-auto px-6 pb-24">
              <div className="flex flex-col items-center mt-6 mb-8">
                <div className="relative mb-4">
                  <div className="size-32 rounded-full border-[3px] border-primary p-1 bg-gradient-to-tr from-primary via-purple-500 to-secondary shadow-[0_0_25px_rgba(168,85,247,0.4)] relative">
                    <img src={user.avatar} alt={user.name} className="w-full h-full rounded-full object-cover border-[3px] border-background" />
                    <div className="absolute bottom-2 right-2 size-4 bg-secondary rounded-full border-2 border-background shadow-[0_0_10px_rgba(163,230,53,0.8)]"></div>
                  </div>
                  <div className="absolute -bottom-1 -right-1 px-3 py-1 rounded-full bg-secondary flex items-center justify-center border-2 border-background text-background font-black text-[10px] uppercase tracking-tighter">LEVEL {user.level}</div>
                </div>
                <h2 className="font-heading text-3xl font-black text-white tracking-tight">{user.name}</h2>
                <p className="text-white/50 text-xs font-bold uppercase tracking-[0.2em] mt-1 mb-2">{user.verified ? 'Ověřený pracovník' : 'Neověřený'}</p>
                <div className="flex items-center gap-1.5 text-secondary">
                  {[...Array(5)].map((_, i) => <iconify-icon key={i} icon={i < Math.floor(user.rating) ? "solar:star-bold" : "solar:star-half-bold"} class="size-4"></iconify-icon>)}
                  <span className="text-white/60 text-xs font-black ml-1.5 px-2 py-0.5 bg-white/10 rounded-full">{user.rating}</span>
                </div>
                {user.bio && <p className="text-muted-foreground text-sm mt-4 text-center max-w-xs">{user.bio}</p>}
              </div>
              <div className="bg-card/50 backdrop-blur-xl border border-white/5 rounded-[2rem] p-6 mb-8 shadow-xl">
                <div className="flex justify-between items-center mb-4">
                  <div className="flex flex-col"><span className="text-[10px] font-black uppercase tracking-[0.1em] text-white/40">Pracovní zkušenosti</span><span className="text-lg font-heading font-black text-white">Elite Pro</span></div>
                  <span className="text-[10px] font-black text-primary bg-primary/10 px-3 py-1.5 rounded-full uppercase tracking-widest border border-primary/30">{user.xp} / {getNextLevelXP()} XP</span>
                </div>
                <div className="w-full h-4 bg-muted rounded-full overflow-hidden border border-white/5 p-[2px]"><div className="h-full bg-gradient-to-r from-primary via-purple-500 to-secondary rounded-full shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all duration-1000" style={{ width: `${progressPercentage}%` }}></div></div>
                <div className="flex items-center gap-2 mt-4 text-[10px] text-white/40 font-bold uppercase tracking-tighter"><iconify-icon icon="solar:info-circle-bold" class="size-3 text-secondary"></iconify-icon>{getNextLevelXP() - user.xp} XP do levelu {user.level + 1} & odemčení 'Prémiových brigád'</div>
              </div>
              <div className="mb-8 overflow-hidden">
                <div className="flex justify-between items-end mb-4 px-1"><h3 className="font-heading text-xl font-black text-white tracking-tight">Odemčené odznaky</h3><button className="text-[10px] font-black text-primary uppercase tracking-widest hover:underline">Zobrazit vše</button></div>
                <div className="flex gap-4 overflow-x-auto pb-4 -mx-6 px-6 no-scrollbar">
                  <div className="flex flex-col items-center gap-2 min-w-[90px] shrink-0"><div className="size-20 rounded-[1.5rem] bg-gradient-to-br from-primary/20 to-primary/5 border border-primary/30 flex items-center justify-center shadow-lg relative group"><div className="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity"></div><iconify-icon icon="fluent-emoji:rocket" class="size-10 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]"></iconify-icon></div><span className="text-[10px] font-black text-center uppercase tracking-tighter text-white/60">Rychlý startér</span></div>
                  <div className="flex flex-col items-center gap-2 min-w-[90px] shrink-0"><div className="size-20 rounded-[1.5rem] bg-gradient-to-br from-secondary/20 to-secondary/5 border border-secondary/30 flex items-center justify-center shadow-lg relative"><iconify-icon icon="fluent-emoji:hundred-points" class="size-10 drop-shadow-[0_0_8px_rgba(163,230,53,0.5)]"></iconify-icon></div><span className="text-[10px] font-black text-center uppercase tracking-tighter text-white/60">Bezchybný</span></div>
                  <div className="flex flex-col items-center gap-2 min-w-[90px] shrink-0"><div className="size-20 rounded-[1.5rem] bg-gradient-to-br from-orange-500/20 to-orange-500/5 border border-orange-500/30 flex items-center justify-center shadow-lg relative"><iconify-icon icon="fluent-emoji:fire" class="size-10 drop-shadow-[0_0_8px_rgba(249,115,22,0.5)]"></iconify-icon></div><span className="text-[10px] font-black text-center uppercase tracking-tighter text-white/60">7denní série</span></div>
                  <div className="flex flex-col items-center gap-2 min-w-[90px] shrink-0 opacity-40 grayscale"><div className="size-20 rounded-[1.5rem] bg-card/50 border border-dashed border-white/10 flex items-center justify-center"><iconify-icon icon="solar:lock-bold" class="size-8 text-white/20"></iconify-icon></div><span className="text-[10px] font-black text-center uppercase tracking-tighter text-white/40">Nejlepší výdělec</span></div>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-4 mb-8">
                <StatsCard icon="solar:case-minimalistic-bold" value={user.jobsDone} label="Dokončené práce" color="primary" />
                <StatsCard icon="solar:clock-circle-bold" value={user.hoursLogged} label="Odpracované hodiny" color="secondary" />
                <StatsCard icon="solar:medal-star-bold" value={`${user.punctuality}%`} label="Docháznost" color="accent" />
                <StatsCard icon="solar:wallet-money-bold" value={`$${user.totalEarned}`} label="Celkový výdělek" color="emerald" />
              </div>
              <button onClick={() => setShowEditModal(true)} className="w-full px-6 py-4 bg-gradient-to-r from-primary to-secondary text-primary-foreground rounded-2xl font-bold hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg">Upravit profil</button>
            </div>
            {showEditModal && <EditProfileModal user={user} onSave={handleSaveProfile} onClose={() => setShowEditModal(false)} />}
          </>
        );
      }

      // ============ MAIN APP ============
      function App() {
        const [currentView, setCurrentView] = useState('jobs');
        const [matches, setMatches] = useState(() => {
          const saved = localStorage.getItem('makej_matches');
          return saved ? JSON.parse(saved) : [];
        });
        const [rejections, setRejections] = useState(() => {
          const saved = localStorage.getItem('makej_rejections');
          return saved ? JSON.parse(saved) : [];
        });

        const addMatch = useCallback((job) => {
          setMatches(prev => {
            if (prev.find(m => m.id === job.id)) return prev;
            const next = [...prev, job];
            localStorage.setItem('makej_matches', JSON.stringify(next));
            return next;
          });
        }, []);

        const addRejection = useCallback((job) => {
          setRejections(prev => {
            if (prev.find(r => r.id === job.id)) return prev;
            const next = [...prev, job];
            localStorage.setItem('makej_rejections', JSON.stringify(next));
            return next;
          });
        }, []);

        const renderView = () => {
          switch (currentView) {
            case 'jobs': return <JobsView matches={matches} onAddMatch={addMatch} onAddRejection={addRejection} onNavigate={setCurrentView} />;
            case 'messages': return <MessagesView matches={matches} />;
            case 'profile': return <ProfileView />;
            default: return <JobsView matches={matches} onAddMatch={addMatch} onAddRejection={addRejection} onNavigate={setCurrentView} />;
          }
        };

        return (
          <div className="flex flex-col h-screen w-full bg-background text-foreground overflow-hidden font-sans relative">
            <div className="flex-1 flex flex-col overflow-hidden view-transition" key={currentView}>
              {renderView()}
            </div>
            <BottomNav currentView={currentView} onNavigate={setCurrentView} matchCount={matches.length} />
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
